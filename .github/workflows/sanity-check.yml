name: sanity-check

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -c "import ast; ast.parse(open('app.py').read()); ast.parse(open('db.py').read()); ast.parse(open('ai.py').read())"
